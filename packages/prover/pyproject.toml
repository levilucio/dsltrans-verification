[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsltrans-prover"
version = "0.1.0"
description = "Symbolic execution engine for DSLTrans model transformations"
requires-python = ">=3.12"
dependencies = [
  "z3-solver==4.13.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
markers = [
  "slow: marks tests as slow-running",
]



